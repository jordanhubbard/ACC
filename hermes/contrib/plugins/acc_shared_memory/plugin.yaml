name: acc_shared_memory
version: "1.0"
description: >
  Peer-to-peer working memory via ACC's Qdrant store.
  Queries fleet memory before each LLM call and stores
  results after sessions, enabling agents to build on
  each other's work without explicit handoffs.
author: Jordan Hubbard
requires:
  env:
    - ACC_URL       # or CCC_URL
    - CCC_AGENT_TOKEN
install: >
  cp -r contrib/plugins/acc_shared_memory ~/.hermes/plugins/
hooks:
  - pre_llm_call
  - post_llm_call
  - on_session_end
